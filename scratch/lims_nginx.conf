# --- KONFIGURASI LOAD BALANCER BACKEND (MULTI-SERVER) ---
upstream lims_backend_cluster {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:8091 max_fails=3 fail_timeout=10s;
}

# --- KONFIGURASI LOAD BALANCER FRONTEND (MULTI-SERVER) ---
upstream lims_frontend_cluster {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
}

# HTTP Server: Mendengarkan port 8088 (akan diteruskan dari port 80 Windows)
# Melakukan redirect otomatis ke HTTPS
server {
    listen 8088;
    server_name lims.local localhost;
    return 301 https://$host$request_uri;
}

# HTTPS Server Block utama: Mendengarkan port 8082 (akan diteruskan dari port 443 Windows)
server {
    listen 8082 ssl;
    server_name lims.local localhost;

    # --- KONFIGURASI SSL ---
    ssl_certificate /etc/nginx/ssl/lims.local+2.pem; 
    ssl_certificate_key /etc/nginx/ssl/lims.local+2-key.pem;

    # Protokol & Cipher SSL Aman
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # --- KONFIGURASI REAL IP ---
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Batasan Ukuran Upload Maksimal
    client_max_body_size 50M;

    # Direktori Frontend Static Assets (React/Vite Production Build)
    root /home/lims/lims1/frontend/dist;
    index index.html;

    # Penanganan Routing React SPA (Menggunakan Proxy ke Cluster PM2 Serve HTTP)
    location / {
        proxy_pass http://lims_frontend_cluster; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Sajikan laporan GoAccess secara statis langsung dari shared reports folder
    location = /report.html {
        alias /home/lims/shared_reports/;
    }

    # Proxy WebSocket untuk Real-time GoAccess
    location /ws {
        proxy_pass http://127.0.0.1:7890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Proxy Request API ke Go Backend
    location /api {
        proxy_pass http://lims_backend_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Meneruskan IP Client Asli untuk Audit Logs (Menggunakan $remote_addr yang telah diperbaiki real_ip)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Proxy untuk Penyajian Folder Uploads Dokumen/Foto Hasil Uji dari shared folder
    location /uploads/ {
        alias /home/lims/shared_uploads/;
        expires 30d; 
        add_header Cache-Control "public, no-transform";
    }

    # Log File NGINX (Menggunakan format monitoring upstream)
    access_log /var/log/nginx/lims_access.log upstream_monitoring;
    error_log /var/log/nginx/lims_error.log;
}
